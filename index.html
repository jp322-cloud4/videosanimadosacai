<!doctype html>
<html lang="en">
  <head>

<script>
  try {
    window.pixelId = "6a1f9c55440afc1968d96847";
    (function() {
      var loadPixel = function() {
        try {
          var a = document.createElement("script");
          a.async = true;
          a.defer = true;
          a.src = "https://cdn.utmify.com.br/scripts/pixel/pixel.js";
          a.onerror = function() {
            console.warn("UTMify script could not be loaded. This is expected in blocked or sandboxed preview iframe environments.");
          };
          document.head.appendChild(a);
        } catch(err) {
          console.warn("Failed to insert UTMify script tag:", err);
        }
      };
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", loadPixel);
      } else {
        loadPixel();
      }
    })();
  } catch(e) {
    console.error("Tracking setup error:", e);
  }
</script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remix: Vídeos Animados para Açaiterias</title>
  </head>
  <body>
    
<script>
  (function() {
    var loadUtms = function() {
      try {
        var s = document.createElement("script");
        s.async = true;
        s.defer = true;
        s.src = "https://cdn.utmify.com.br/scripts/utms/latest.js";
        s.setAttribute("data-utmify-prevent-xcod-sck", "");
        s.setAttribute("data-utmify-prevent-subids", "");
        s.onerror = function() {
          console.warn("Failed to load UTM helper script. This is expected in sandboxed preview iframe contexts.");
        };
        document.body.appendChild(s);
      } catch(e) {
        console.warn("Failed to insert UTM tracking script tag:", e);
      }
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadUtms);
    } else {
      loadUtms();
    }
  })();
</script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
